<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle -->
  <rect width="128" height="128" rx="28" fill="#0f172a" />
  <rect width="120" height="120" x="4" y="4" rx="24" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.3" />
  
  <!-- Network connections -->
  <g stroke="url(#grad)" stroke-width="3" stroke-linecap="round" opacity="0.8" filter="url(#glow)">
    <line x1="34" y1="34" x2="64" y2="64" />
    <line x1="94" y1="34" x2="64" y2="64" />
    <line x1="34" y1="94" x2="64" y2="64" />
    <line x1="94" y1="94" x2="64" y2="64" />
    <line x1="64" y1="24" x2="64" y2="64" />
    <line x1="104" y1="64" x2="64" y2="64" />
  </g>
  
  <!-- Nodes / Circles -->
  <g filter="url(#glow)">
    <circle cx="64" cy="64" r="10" fill="url(#grad)" />
    <circle cx="34" cy="34" r="7" fill="#38bdf8" />
    <circle cx="94" cy="34" r="7" fill="#818cf8" />
    <circle cx="34" cy="94" r="7" fill="#818cf8" />
    <circle cx="94" cy="94" r="7" fill="#38bdf8" />
    <circle cx="64" cy="24" r="6" fill="#38bdf8" />
    <circle cx="104" cy="64" r="6" fill="#818cf8" />
  </g>
</svg>
